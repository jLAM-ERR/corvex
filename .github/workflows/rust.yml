# =============================================================================
# GitHub Actions: CI + Release for macOS, Linux & Windows
# =============================================================================
# CI:      runs tests, clippy, fmt on macOS and Windows for every push/PR
# Release: builds platform binaries and publishes GitHub Release on tag push
# =============================================================================

name: CI & Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0 or 1.0.0-beta)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BINARY_NAME: corvex

# =============================================================================
# CI: test + lint on both platforms
# =============================================================================
jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings -A dead_code

      - name: Format check
        run: cargo fmt --check

  # ==========================================================================
  # Release guard: fail fast before spending build minutes.
  # This repo has immutable releases enabled — a published release can never
  # receive assets, and its tag name is permanently reserved. Releases must be
  # created by this workflow (tag push), never manually via `gh release create`.
  # ==========================================================================
  release-guard:
    name: Release Preconditions
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Fail if release already published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          is_draft="$(gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft' 2>/dev/null || echo 'not-found')"
          if [ "$is_draft" = "false" ]; then
            echo "::error::Release ${TAG_NAME} already exists and is published. Immutable releases cannot receive assets after publishing, so this workflow cannot attach binaries to it. Do not create releases manually with 'gh release create' — push the tag and let this workflow create the release."
            exit 1
          fi

      - name: Fail if RELEASE_NOTES.md does not match version
        run: |
          first_line="$(head -1 RELEASE_NOTES.md)"
          if ! printf '%s' "$first_line" | grep -qF "v${VERSION}"; then
            echo "::error::RELEASE_NOTES.md header '${first_line}' does not mention v${VERSION}. Update RELEASE_NOTES.md before releasing — it becomes the release body."
            exit 1
          fi

  # ==========================================================================
  # Release: macOS universal binary
  # ==========================================================================
  release-macos:
    name: Release macOS
    needs: [test, release-guard]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-cargo-

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/${BINARY_NAME} \
            target/aarch64-apple-darwin/release/${BINARY_NAME} \
            -output dist/${BINARY_NAME}
          file dist/${BINARY_NAME}
          lipo -info dist/${BINARY_NAME}

      - name: Package
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${VERSION}-darwin-universal"
          ARCHIVE_DIR="archive-staging/${ARCHIVE_NAME}"
          mkdir -p "${ARCHIVE_DIR}"
          cp dist/${BINARY_NAME} "${ARCHIVE_DIR}/"
          chmod +x "${ARCHIVE_DIR}/${BINARY_NAME}"
          for f in README.md LICENSE CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" "${ARCHIVE_DIR}/"
          done
          [ -d "examples" ] && cp -a examples "${ARCHIVE_DIR}/examples"
          tar -czf "${ARCHIVE_NAME}.tar.gz" -C archive-staging "${ARCHIVE_NAME}"
          shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}.tar.gz
            ${{ env.ARCHIVE_NAME }}.tar.gz.sha256
          retention-days: 7

  # ==========================================================================
  # Release: Linux x86_64 binary (static, musl)
  # ==========================================================================
  release-linux:
    name: Release Linux
    needs: [test, release-guard]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${VERSION}-linux-x86_64"
          ARCHIVE_DIR="archive-staging/${ARCHIVE_NAME}"
          mkdir -p "${ARCHIVE_DIR}"
          cp target/x86_64-unknown-linux-musl/release/${BINARY_NAME} "${ARCHIVE_DIR}/"
          chmod +x "${ARCHIVE_DIR}/${BINARY_NAME}"
          for f in README.md LICENSE CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" "${ARCHIVE_DIR}/"
          done
          [ -d "examples" ] && cp -a examples "${ARCHIVE_DIR}/examples"
          tar -czf "${ARCHIVE_NAME}.tar.gz" -C archive-staging "${ARCHIVE_NAME}"
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}.tar.gz
            ${{ env.ARCHIVE_NAME }}.tar.gz.sha256
          retention-days: 7

  # ==========================================================================
  # Release: Windows x86_64 binary
  # ==========================================================================
  release-windows:
    name: Release Windows
    needs: [test, release-guard]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Build
        run: cargo build --release

      - name: Package
        shell: bash
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${VERSION}-windows-x86_64"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/release/${BINARY_NAME}.exe" "${ARCHIVE_NAME}/"
          [ -f "README.md" ] && cp README.md "${ARCHIVE_NAME}/"
          [ -d "examples" ] && cp -r examples "${ARCHIVE_NAME}/examples"
          7z a "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}"
          sha256sum "${ARCHIVE_NAME}.zip" > "${ARCHIVE_NAME}.zip.sha256"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            ${{ env.ARCHIVE_NAME }}.zip
            ${{ env.ARCHIVE_NAME }}.zip.sha256
          retention-days: 7

  # ==========================================================================
  # Publish GitHub Release (after both platform builds succeed)
  # ==========================================================================
  publish-release:
    name: Publish Release
    needs: [release-macos, release-linux, release-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f

      - name: Compose release body
        run: |
          BODY_FILE="release-body.md"
          if [ -f "RELEASE_NOTES.md" ]; then
            cat RELEASE_NOTES.md >> "${BODY_FILE}"
            printf '\n---\n\n' >> "${BODY_FILE}"
          fi

          cat >> "${BODY_FILE}" << EOF
          ## Installation

          On macOS or Linux, \`install.sh\` installs corvex and the xray engine binary automatically:
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/install.sh | sh
          \`\`\`

          Or install manually:

          ### macOS
          \`\`\`bash
          curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${BINARY_NAME}-${VERSION}-darwin-universal.tar.gz | tar xz
          sudo mv ${BINARY_NAME}-${VERSION}-darwin-universal/${BINARY_NAME} /usr/local/bin/
          \`\`\`

          ### Linux (x86_64)
          \`\`\`bash
          curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${BINARY_NAME}-${VERSION}-linux-x86_64.tar.gz | tar xz
          sudo mv ${BINARY_NAME}-${VERSION}-linux-x86_64/${BINARY_NAME} /usr/local/bin/
          \`\`\`

          ### Windows
          Download \`${BINARY_NAME}-${VERSION}-windows-x86_64.zip\`, extract, and add to PATH.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Release ${{ env.TAG_NAME }}"
          body_path: release-body.md
          files: release-artifacts/**/*
          prerelease: ${{ contains(env.VERSION, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
